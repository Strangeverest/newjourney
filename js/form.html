<head>
    <meta charset="UTF-8">

<body style="width: 100%; display: grid; place-items: center; margin-top: 5%; ">
   
        <div class="class" style="display: flex; justify-content: center; align-items: center; border: 2px; border-style: solid; border-color: rgb(0, 0, 0); width: 50%; height:auto; margin-top: 20px;">
            <div class="text"><h1>calculator</h1></div>
            

        </div>

        <div class="class" style="display: flex; justify-content: center; align-items: center; border: 2px; border-style: solid; border-color: rgb(0, 0, 0); width: 50%; height:auto; margin-top: 20px; ">
            <div class="text"><h1 id="output">calculator</h1></div>
            

        </div>

         <div class="class" style="display: flex; border: 2px; border-style: solid; border-color: rgb(0, 0, 0); width: 50%; height:auto; margin-top: 20px;">
            <div class="buttons" style="width: 100%;  padding: 10px; " >
               <button id="one" style="width: 30%; padding: 10px; margin: 5px;">1</button>
               <button id="two" style="width: 30%; padding: 10px; margin: 5px;">2</button>
               <button id="three" style="width: 30%; padding: 10px; margin: 5px;">3</button>
               <button id="four" style="width: 30%; padding: 10px; margin: 5px;">4</button>
               <button id="five" style="width: 30%; padding: 10px; margin: 5px;">5</button>
               <button id="six" style="width: 30%; padding: 10px; margin: 5px;">6</button>
               <button id="seven" style="width: 30%; padding: 10px; margin: 5px;">7</button>
               <button id="eight" style="width: 30%; padding: 10px; margin: 5px;">8</button>
               <button id="nine" style="width: 30%; padding: 10px; margin: 5px;">9</button>
               <button id="zero" style="width: 30%; padding: 10px; margin: 5px;">0</button>
               <button id="add" style="width: 30%; padding: 10px; margin: 5px;">+</button>
               <button id="subtract" style="width: 30%; padding: 10px; margin: 5px;">-</button>
               <button id="multiply" style="width: 30%; padding: 10px; margin: 5px;">x</button>
               <button id="divide" style="width: 30%; padding: 10px; margin: 5px;">/</button>
               <button id="equal" style="width: 30%; padding: 10px; margin: 5px;">=</button>
               <button id="delete" style="width: 30%; padding: 10px; margin: 5px;">del</button>
               <button id="clear" style="width: 30%; padding: 10px; margin: 5px;">cls</button>

            </div>
            

        </div>
   
</body>
